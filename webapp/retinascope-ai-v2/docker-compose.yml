services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/checkpoints:/app/checkpoints:ro

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_BACKEND_API_URL: http://localhost:8000
      NEXT_PUBLIC_USE_MOCK_PIPELINE: "false"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: retinascope
      POSTGRES_PASSWORD: retinascope
      POSTGRES_DB: retinascope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: retinascope
      MINIO_ROOT_PASSWORD: replace_me_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
