services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      CHECKPOINT_DIR: checkpoints
    ports:
      - "8000:8000"
    volumes:
      - ./backend/checkpoints:/app/checkpoints:ro

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: retinascope
      POSTGRES_USER: retina
      POSTGRES_PASSWORD: retina
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: retinascope
      MINIO_ROOT_PASSWORD: retinascope-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
